- name: Install postgresql
  apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: yes
  become: true

- name: postgresql running
  service:
    name: postgresql
    state: started
    enabled: true
  become: true

- name: PostgreSQL configuration
  template:
    src: postgresql.conf.j2
    dest: /etc/postgresql/16/main/postgresql.conf
  notify: Restart postgresql
  become: true