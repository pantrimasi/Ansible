- name: Install postgresql
  apt:
    name: postgresql
    state: present
    update_cache: true
  become: true

- name: Ensure PostgreSQL cluster exists
  command: pg_createcluster 16 main --start
  args:
    creates: /var/lib/postgresql/16/main
  become: true

- name: postgresql running
  service:
    name: postgresql
    state: started
    enabled: true
  become: true

- name: PostgreSQL configuration
  template:
    src: postgresql.conf.j2
    dest: /etc/postgresql/16/main/postgresql.conf
  notify: Restart postgresql
  become: true

- name: Create database
  postgresql_db:
    name: "{{ postgres_db }}"
  become: true
  become_user: postgres

- name: Create user
  postgresql_user:
    name: "{{ postgres_user }}"
    password: "{{ postgres_password }}"
  become: true
  become_user: postgres