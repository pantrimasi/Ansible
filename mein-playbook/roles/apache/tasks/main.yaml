- name: Install apache2
  apt:
    name: apache2
    state: present
    update_cache: true
  become: true

- name: Apache running
  service:
    name: apache2
    state: started
    enabled: true
  become: true

- name: Create web dir
  file:
    path: "{{ web_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  become: true

- name: Copy html files
  copy:
    src: "{{ item }}"
    dest: "{{ web_root }}/{{ item }}"
    owner: www-data
    group: www-data
    mode: '0644'
  loop: "{{ web_files }}"
  become: true

- name: Deploy index
  template:
    src: index.html.j2
    dest: "{{ web_root }}"/auftrag.html
    owner: www-data
    group: www-data
  become: true

- name: Deploy vhost
  template:
    src: vhost.conf.j2
    dest: /etc/apache2/sites-available/my_site.conf
  notify: Reload apache
  become: true

- name: Enable site
  command: a2ensite my_site.conf
  notify: Reload apache
  become: true

- name: Disable default site
  command: a2dissite 000-default.conf
  notify: Reload apache
  become: true